<title>YoungFinance Bergen — Partneroversikt</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Roboto',sans-serif;background:#F7F3E7;display:flex;
     align-items:center;justify-content:center;min-height:100vh}
.lock-box{background:#fff;border-radius:16px;padding:48px 40px;
  max-width:380px;width:90%;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.lock-box h1{font-family:'Josefin Sans',sans-serif;font-size:1.4rem;
  color:#2F2F2D;margin-bottom:6px}
.lock-box p{font-size:0.85rem;color:#54595F;margin-bottom:24px}
.lock-box input{width:100%;padding:12px 16px;border:1px solid #E8E4D9;
  border-radius:8px;font-size:0.95rem;outline:none;margin-bottom:12px;
  font-family:'Roboto',sans-serif}
.lock-box input:focus{border-color:#F6C928}
.lock-box button{width:100%;padding:12px;background:#F6C928;border:none;
  border-radius:8px;font-family:'Josefin Sans',sans-serif;font-size:0.95rem;
  font-weight:600;color:#2F2F2D;cursor:pointer;transition:background .2s}
.lock-box button:hover{background:#F3B12A}
.error{color:#E53935;font-size:0.8rem;margin-top:8px;display:none}
.logo{width:56px;margin-bottom:16px;opacity:0.85}
</style>
</head>
<body>
<div class="lock-box" id="loginBox">
  <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="#2F2F2D" stroke-width="1.5">
    <rect x="3" y="11" width="18" height="11" rx="2"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    <circle cx="12" cy="16" r="1"/>
  </svg>
  <h1>YoungFinance Bergen</h1>
  <p>Partneroversikt — skriv inn passord</p>
  <form onsubmit="return unlock()">
    <input type="password" id="pw" placeholder="Passord" autofocus>
    <button type="submit">Lås opp</button>
  </form>
  <div class="error" id="err">Feil passord</div>
</div>

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    {name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256"},
    keyMaterial,
    {name: "AES-GCM", length: 256},
    false,
    ["decrypt"]
  );
}

async function unlock() {
  const pw = document.getElementById("pw").value;
  if (!pw) return false;
  try {
    const salt = Uint8Array.from(atob(ENCRYPTED.salt), c => c.charCodeAt(0));
    const iv   = Uint8Array.from(atob(ENCRYPTED.iv),   c => c.charCodeAt(0));
    const ct   = Uint8Array.from(atob(ENCRYPTED.ct),   c => c.charCodeAt(0));
    const key  = await deriveKey(pw, salt);
    const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
    const html = new TextDecoder().decode(plain);
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    document.getElementById("err").style.display = "block";
    document.getElementById("pw").select();
  }
  return false;
}
