<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YoungFinance Bergen &mdash; Partneroversikt</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#F6C928;--warm-gold:#F3B12A;--dark:#2F2F2D}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Roboto',sans-serif;background:var(--dark);display:flex;align-items:center;justify-content:center;}

#yf-frame{position:fixed;inset:0;width:100%;height:100%;border:none;z-index:9999;display:none;}

/* Background */
.bg-orbs{position:fixed;inset:0;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:orbFloat 20s ease-in-out infinite;}
.orb-1{width:600px;height:600px;background:var(--gold);top:-200px;left:-100px;animation-delay:0s}
.orb-2{width:500px;height:500px;background:#F5E0B1;bottom:-150px;right:-100px;animation-delay:-7s}
.orb-3{width:400px;height:400px;background:var(--warm-gold);top:50%;left:60%;animation-delay:-14s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(60px,-40px) scale(1.1)}50%{transform:translate(-30px,50px) scale(0.95)}75%{transform:translate(-50px,-20px) scale(1.05)}}
.particles{position:fixed;inset:0;z-index:1;pointer-events:none}
.particle{position:absolute;background:var(--gold);border-radius:50%;opacity:0;animation:particleRise linear infinite;}
@keyframes particleRise{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:0.6}90%{opacity:0.3}100%{opacity:0;transform:translateY(-10vh) scale(1)}}
.grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(246,201,40,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(246,201,40,0.03) 1px,transparent 1px);background-size:60px 60px;animation:gridShift 30s linear infinite;}
@keyframes gridShift{0%{transform:perspective(500px) rotateX(60deg) translateY(0)}100%{transform:perspective(500px) rotateX(60deg) translateY(60px)}}

/* Card: CSS-only entrance — no JS spring engine */
@keyframes cardIn{0%{opacity:0;transform:translateY(48px) scale(0.97)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{0%{opacity:0;transform:scaleX(0)}100%{opacity:1;transform:scaleX(1)}}
@keyframes borderPulse{
  0%,100%{border-color:rgba(246,201,40,0.15);box-shadow:0 25px 60px rgba(0,0,0,0.4),0 0 80px rgba(246,201,40,0.05),inset 0 1px 0 rgba(255,255,255,0.05)}
  50%{border-color:rgba(246,201,40,0.32);box-shadow:0 25px 60px rgba(0,0,0,0.4),0 0 130px rgba(246,201,40,0.14),inset 0 1px 0 rgba(255,255,255,0.08)}
}
/* Wrong-password shake on the card */
@keyframes cardShake{0%,100%{transform:translateX(0)}18%{transform:translateX(-10px)}36%{transform:translateX(10px)}54%{transform:translateX(-6px)}72%{transform:translateX(6px)}}
.card-shake{animation:cardShake 0.42s ease !important;}

.login-card{
  position:relative;z-index:10;width:420px;max-width:92vw;
  background:rgba(47,47,45,0.85);backdrop-filter:blur(40px);
  border:1px solid rgba(246,201,40,0.15);border-radius:24px;
  padding:48px 40px 40px;text-align:center;
  animation:cardIn 0.65s cubic-bezier(0.34,1.4,0.64,1) 0.06s both,
            borderPulse 4s ease-in-out infinite 3s;
}
.logo-wrap{margin-bottom:20px;animation:fadeUp 0.45s ease 0.3s both;}
.logo-img{width:180px;height:auto;filter:brightness(0) invert(1);}
.gold-divider{width:48px;height:2px;background:var(--gold);margin:0 auto 20px;border-radius:2px;transform-origin:left center;animation:scaleIn 0.35s ease 0.42s both;}
h1{font-family:'Josefin Sans',sans-serif;font-size:1.1rem;font-weight:500;color:rgba(255,255,255,0.9);margin-bottom:6px;letter-spacing:0.04em;animation:fadeUp 0.4s ease 0.5s both;}
.subtitle{font-size:0.8rem;color:rgba(255,255,255,0.4);margin-bottom:28px;letter-spacing:0.06em;text-transform:uppercase;animation:fadeUp 0.4s ease 0.56s both;}
.input-group{position:relative;margin-bottom:16px;animation:fadeUp 0.4s ease 0.62s both;}
.input-group input{width:100%;padding:14px 18px 14px 44px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;font-size:0.95rem;color:#fff;outline:none;font-family:'Roboto',sans-serif;transition:border-color 0.25s,background 0.25s,box-shadow 0.25s;}
.input-group input::placeholder{color:rgba(255,255,255,0.3)}
.input-group input:focus{border-color:var(--gold);background:rgba(246,201,40,0.06);box-shadow:0 0 0 3px rgba(246,201,40,0.1);}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);pointer-events:none;transition:color 0.25s;}
.input-group input:focus~.input-icon{color:var(--gold)}
.btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--gold),var(--warm-gold));
  border:none;border-radius:12px;
  font-family:'Josefin Sans',sans-serif;font-size:0.95rem;font-weight:600;color:var(--dark);
  cursor:pointer;animation:fadeUp 0.4s ease 0.68s both;
  transition:transform 0.18s cubic-bezier(0.34,1.5,0.64,1),box-shadow 0.18s;
}
.btn:hover{transform:scale(1.04);box-shadow:0 10px 28px rgba(246,201,40,0.36);}
.btn:active{transform:scale(0.97);box-shadow:none;}
.btn:focus-visible{outline:2px solid rgba(246,201,40,0.8);outline-offset:3px;}
.btn.loading{pointer-events:none;opacity:0.7;transform:scale(1) !important;}
.btn.loading::before{content:'';display:inline-block;width:16px;height:16px;border:2px solid var(--dark);border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#FF6B6B;font-size:0.82rem;margin-top:10px;min-height:20px;}
</style>
</head>

async function deriveKey(pw, salt){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
}

    onmouseover="this.style.background='#F6C928';this.style.color='#2F2F2D'"
    onmouseout="this.style.background='#2F2F2D';this.style.color='#F6C928'"
    onclick="parent.localStorage.removeItem('yf_pw');parent.location.reload();">
    Logg ut</div>`;
  return html.replace('</body>', btn+'</body>');
}

function showDashboard(html){
  const frame=document.getElementById('yf-frame');
  frame.srcdoc=injectLogout(html);
  frame.style.display='block';
  // Hide everything else
  document.getElementById('loginCard').style.display='none';
  document.querySelector('.bg-orbs').style.display='none';
  document.querySelector('.grid-bg').style.display='none';
  document.getElementById('particles').style.display='none';
}

async function tryDecrypt(pw){
  const salt=Uint8Array.from(atob(ENCRYPTED.salt),c=>c.charCodeAt(0));
  const iv  =Uint8Array.from(atob(ENCRYPTED.iv),  c=>c.charCodeAt(0));
  const ct  =Uint8Array.from(atob(ENCRYPTED.ct),  c=>c.charCodeAt(0));
  const key =await deriveKey(pw,salt);
  try{
    const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
    return new TextDecoder().decode(plain);
  }catch(e){ return null; }
}

// Auto-unlock from localStorage
(async function(){
  const saved=localStorage.getItem('yf_pw');
  if(!saved) return;
  document.getElementById('cardTitle').textContent='Laster\u2026';
  document.getElementById('cardSub').textContent='Henter dashboard';
  document.getElementById('loginForm').style.display='none';
  const html=await tryDecrypt(saved);
  if(html){ showDashboard(html); }
  else{
    localStorage.removeItem('yf_pw');
    document.getElementById('loginForm').style.display='';
    document.getElementById('cardTitle').textContent='Partneroversikt';
    document.getElementById('cardSub').textContent='Kun for styremedlemmer';
    showError('\u274C Sesjon utl\u00f8pt \u2014 logg inn p\u00e5 nytt');
  }
})();

async function unlock(){
  const pw=document.getElementById("pw").value;
  if(!pw) return;
  const btn=document.getElementById("btnSubmit");
  btn.classList.add("loading"); btn.textContent="Dekrypterer\u2026";
  document.getElementById("err").textContent="";
  const html=await tryDecrypt(pw);
  if(html){
    localStorage.setItem('yf_pw',pw);
    showDashboard(html);
  } else {
    btn.classList.remove("loading"); btn.textContent="L\u00e5s opp";
    showError("\u274C Feil passord \u2014 pr\u00f8v igjen");
    document.getElementById("pw").select();
  }
}

// Prevent default form submission (async function can't return false)
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  unlock();
});
</script>
